services:
  kanban_db:
    image: postgres:17-alpine
    container_name: kanban_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - kanban_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: kanban_api
    restart: always
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@kanban_db:5432/${POSTGRES_DB}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_SECURE: ${MAIL_SECURE}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
    ports:
      - "3000:3000"
    depends_on:
      kanban_db:
        condition: service_healthy
    networks:
      - kanban_network
    command: >
      sh -c "npx prisma db push --accept-data-loss && node dist/src/main"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: kanban_web
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - kanban_network

networks:
  kanban_network:
    driver: bridge

volumes:
  db_data:
